# SonarQube / SonarCloud Project Configuration
# Dashboard: https://sonarcloud.io/dashboard?id=ByronWilliamsCPA_reference-library

sonar.projectKey=ByronWilliamsCPA_reference-library
sonar.organization=byronwilliamscpa

# Display name in SonarCloud UI
sonar.projectName=Reference Library

# Only Python source is in scripts/; legal-style and writing-style are reference docs
sonar.sources=scripts

# Tests live in tests/ and exercise scripts/profile_resolver.py
sonar.tests=tests

# Encoding of the source files
sonar.sourceEncoding=UTF-8

# Python-specific settings
sonar.python.version=3.12

# Exclusions
sonar.exclusions=**/.worktrees/**,**/node_modules/**,**/*.pyc,**/__pycache__/**,docs/compliance-reports/**

# Coverage report produced by the sonarcloud.yml workflow (pytest --cov-report=xml)
sonar.python.coverage.reportPaths=coverage.xml
