# Pre-commit hooks configuration
# See https://pre-commit.com for more information
#
# Hook stages:
# - pre-commit: Fast checks on every commit (formatting, syntax, security)
# - commit-msg: Conventional commit message validation
#
# This is a docs-only repository. Python-specific hooks (ruff, basedpyright,
# bandit, darglint, interrogate) are not included.

repos:
  # ============================================================================
  # Secret Detection - detect-secrets (PC-005)
  # ============================================================================
  # Catches high-entropy strings, API keys, tokens, and credentials.
  # Uses baseline file to track known false positives.
  - repo: https://github.com/Yelp/detect-secrets
    rev: "01886c8a910c64595c47f186ca1ffc0b77fa5458"  # v1.5.0  # pragma: allowlist secret
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        stages: [pre-commit]
        exclude: (\.lock$|\.secrets\.baseline$)

  # ============================================================================
  # Secret Detection - trufflehog (PC-013)
  # ============================================================================
  # Dual-layer secret scanning: trufflehog catches secrets detect-secrets misses.
  # Scans staged files only; fails closed if trufflehog is absent.
  # Portability notes:
  #   - Uses NUL-delimited names end-to-end (no tr round-trip through newlines)
  #     so filenames with embedded newlines are preserved.
  #   - Explicit empty-list guard avoids `xargs -r` (GNU-only; absent on
  #     older macOS/BSD xargs).
  - repo: https://github.com/trufflesecurity/trufflehog
    rev: "37b77001d0174ebec2fcca2bd83ff83a6d45a3ab"  # v3.95.3  # pragma: allowlist secret
    hooks:
      - id: trufflehog
        entry: >-
          bash -c 'files=$(git diff --cached -z --name-only --diff-filter=d 2>/dev/null
          | awk -v RS="\0" -v ORS="\0" "!/^CHANGELOG\\.md\$/ && !/^\\.submodules\\//");
          [ -z "$files" ] && exit 0;
          printf "%s" "$files" | xargs -0 trufflehog filesystem --fail --no-update'
        pass_filenames: false
        stages: [pre-commit]

  # ============================================================================
  # Conventional Commits Enforcement (PC-008)
  # ============================================================================
  - repo: https://github.com/commitizen-tools/commitizen
    rev: "cc981fcb065527b6de0033b0cbf0432e69781901"  # v4.9.1  # pragma: allowlist secret
    hooks:
      - id: commitizen
        stages: [commit-msg]

  # ============================================================================
  # YAML Linting (PC-009)
  # ============================================================================
  - repo: https://github.com/adrienverge/yamllint
    rev: "cba56bcde1fdd01c1deb3f945e69764c291a6530"  # v1.38.0  # pragma: allowlist secret
    hooks:
      - id: yamllint
        stages: [pre-commit]

  # ============================================================================
  # Markdown Linting (PC-010)
  # ============================================================================
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: "e72a3ca1632f0b11a07d171449fe447a7ff6795e"  # v0.48.0  # pragma: allowlist secret
    hooks:
      - id: markdownlint
        args: ['--config', '.qlty/configs/.markdownlint.yaml']
        stages: [pre-commit]
        exclude: |
          (?x)^(
            samples/|
            agents/|
            CLAUDE\.md
          )

  # ============================================================================
  # Em-Dash Prevention (PC-011)
  # ============================================================================
  # Blocks the em-dash character (U+2014) in committed text files.
  # See writing standards in ~/.claude/CLAUDE.md (writing style section).
  #
  # Excluded paths fall into two categories:
  #
  # PERMANENT exclusions (transcribed authority text; modifying corrupts
  # reference value):
  #   - legal-style/  Oregon courts and legislature source documents
  #   - writing-style/  Elements of Style, CMS, and related reference material
  #
  # SCOPED cleanup (repo-authored content with pre-existing em-dashes;
  # targeted for remediation, not permanent exclusion):
  #   - agents/        agent definition files
  #   - samples/       writing samples directory
  #   - .github/       workflow and config files
  #   - .qlty/         qlty config files
  #   - .pre-commit-config.yaml  this file
  - repo: local
    hooks:
      - id: no-em-dash
        name: No em-dashes
        language: pygrep
        entry: "—"
        types: [text]
        stages: [pre-commit]
        # Tracking: scoped cleanup target 2026-12-31
        exclude: |
          (?x)^(
            agents/|
            samples/|
            \.github/|
            \.qlty/|
            legal-style/|
            writing-style/|
            \.pre-commit-config\.yaml
          )
