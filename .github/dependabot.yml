version: 2
# Detection-only: Renovate is the sole PR-opener. open-pull-requests-limit: 0
# suppresses Dependabot version PRs. Dependabot alerts (a repo setting) remain
# the multi-ecosystem detection ledger. Refs: standards CI-021 (amended), CI-074.
#
# Guarantee dependency: "sole PR-opener" also requires Dependabot security
# updates to stay DISABLED at the repo level (Settings > Code security).
# open-pull-requests-limit: 0 suppresses version-update PRs only; security-update
# PRs use a separate internal limit (10) that this file cannot override. If that
# repo setting is ever enabled, Dependabot can open PRs and this invariant breaks.
# Verified disabled 2026-06-05 via /repos/.../automated-security-fixes.
updates:
  - package-ecosystem: "pip"            # Python: pyproject.toml / requirements / uv
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
  - package-ecosystem: "github-actions" # if .github/workflows/ present
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
