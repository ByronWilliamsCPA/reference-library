# Dependency Review Workflow
# Scans pull requests for newly introduced dependencies with known vulnerabilities.
# Documentation: https://github.com/actions/dependency-review-action
name: Dependency Review

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2.19.1
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48  # v4.9.0
        with:
          fail-on-severity: high
          # Surface findings on the PR (uses the pull-requests: write permission above).
          comment-summary-in-pr: on-failure
          # Disable Scorecard lookups so harden-runner's block egress does not need
          # api.securityscorecards.dev or api.osv.dev allowlisted; vulnerability
          # detection itself uses GitHub's API which is already permitted.
          show-openssf-scorecard: false
