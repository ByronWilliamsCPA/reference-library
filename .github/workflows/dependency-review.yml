# Dependency Review Workflow
# Scans pull requests for newly introduced dependencies with known vulnerabilities.
# Documentation: https://github.com/actions/dependency-review-action
name: Dependency Review

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443

      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
        with:
          persist-credentials: false

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # v5.0.0
        with:
          fail-on-severity: high
          # Surface findings on the PR (uses the pull-requests: write permission above).
          comment-summary-in-pr: on-failure
          # Disable Scorecard lookups so harden-runner's block egress does not need
          # api.securityscorecards.dev or api.osv.dev allowlisted; vulnerability
          # detection itself uses GitHub's API which is already permitted.
          show-openssf-scorecard: false
