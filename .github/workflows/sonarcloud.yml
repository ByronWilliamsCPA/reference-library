# SonarCloud Analysis for reference-library
# Runs static analysis on the scripts/ directory and uploads results to SonarCloud.
# Config: sonar-project.properties
# Dashboard: https://sonarcloud.io/dashboard?id=ByronWilliamsCPA_reference-library
# Documentation: https://github.com/SonarSource/sonarcloud-github-action
name: SonarCloud Analysis

on:
  push:
    branches:
      - main
      - master
  pull_request:
    types: [opened, synchronize, reopened]
  # merge_group: "SonarCloud Code Analysis" is required in the merge queue, but
  # SonarCloud's GitHub App reports that status only on pull_request events, not
  # on merge_group refs (known SonarSource limitation). The real scan therefore
  # stays PR/push-only (see the job-level if: below) and the merge_group path is
  # satisfied by the lightweight gate job at the end of this file.
  merge_group:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: sonarcloud-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonarcloud:
    name: SonarCloud Scan
    # Skip on merge_group: SonarCloud's App will not post the required status on
    # queue refs, so running the scanner there only burns minutes and exposes
    # SONAR_TOKEN for no enforceable gate. The merge-queue-gate job covers it.
    if: github.event_name != 'merge_group'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          # Pin minimum versions to reduce supply-chain risk on a runner
          # that holds SONAR_TOKEN. Bump intentionally, not silently.
          # pytest floor 9.0.3 fixes CVE-2025-71176 (see pyproject.toml).
          python -m pip install 'pytest>=9.0.3,<10' 'pytest-cov>=4.0,<8'

      - name: Run tests with coverage
        run: |
          pytest --cov=scripts --cov-report=xml --cov-report=term

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@ffc3010689be73b8e5ae0c57ce35968afd7909e8  # v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  # Merge-queue shim for the required "SonarCloud Code Analysis" context.
  # SonarCloud's App posts that status on pull_request events only; on
  # merge_group refs it never reports, so without this job the merge queue waits
  # the full 60-minute timeout and then fails the entry. The real quality gate
  # already ran and passed on the PR under this same required context, and the
  # ruleset pins no integration_id to it, so this GitHub Actions job legitimately
  # satisfies the requirement on the queued commit. The job name MUST stay
  # exactly "SonarCloud Code Analysis" to match the required check context.
  sonarcloud-merge-queue-gate:
    name: SonarCloud Code Analysis
    if: github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit
      - name: Confirm SonarCloud gate (validated on the PR)
        run: |
          echo "SonarCloud quality gate was validated at PR time under this same"
          echo "required context. SonarCloud does not report on merge_group refs,"
          echo "so this job satisfies the merge-queue required check."
