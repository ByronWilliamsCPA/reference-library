name: Repo Health

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-health:
    name: repo-health
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99  # v2.19.2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Check required files exist
        run: |
          MISSING=0
          for FILE in SECURITY.md CONTRIBUTING.md CHANGELOG.md CLAUDE.md README.md; do
            if [ ! -f "$FILE" ]; then
              echo "::error::Required file missing: $FILE"
              MISSING=1
            else
              echo "Found: $FILE"
            fi
          done
          if [ "$MISSING" -eq 1 ]; then
            exit 1
          fi
          echo "Repository health check passed: all required files present."
