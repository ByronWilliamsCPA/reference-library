name: Qlty

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full-codebase health scan: Monday 07:00 UTC
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions: read-all

concurrency:
  # Key by event so a push to main and the Monday scheduled scan (both of
  # which resolve github.ref to refs/heads/main) do not share a group and
  # cancel each other.
  group: qlty-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Coverage upload after merges to main only.
  qlty:
    if: github.event_name == 'push'
    uses: ByronWilliamsCPA/.github/.github/workflows/python-qlty-coverage.yml@671ea6d3bad0d0df346b6b401144e05a48172202  # main
    permissions:
      contents: read
      actions: read
    with:
      coverage-artifact-name: coverage-reports
      coverage-file-path: coverage.xml
      coverage-format: cobertura
    secrets:
      QLTY_COVERAGE_TOKEN: ${{ secrets.QLTY_COVERAGE_TOKEN }}

  # PR gate: diff mode, block merges that introduce medium+ severity issues.
  # Check name: "qlty-gate / Qlty Gate" -- required by org baseline ruleset.
  qlty-gate:
    if: github.event_name == 'pull_request'
    uses: ByronWilliamsCPA/.github/.github/workflows/python-qlty-gate.yml@671ea6d3bad0d0df346b6b401144e05a48172202  # main
    permissions:
      contents: read
    with:
      fail-level: medium
      upstream: origin/${{ github.base_ref }}

  # Weekly health scan: full codebase, informational only.
  # Reports accumulated debt without blocking workflows.
  # Remove no-fail once the existing 100-issue backlog is resolved.
  qlty-health:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    uses: ByronWilliamsCPA/.github/.github/workflows/python-qlty-gate.yml@671ea6d3bad0d0df346b6b401144e05a48172202  # main
    permissions:
      contents: read
    with:
      fail-level: high
      check-all: true
      no-fail: true
