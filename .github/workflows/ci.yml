name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'merge_group' }}

jobs:
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            codeload.github.com:443
            pypi.org:443
            files.pythonhosted.org:443

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          persist-credentials: false

      - name: Verify key documentation files exist
        run: |
          MISSING=0
          for FILE in README.md CLAUDE.md SECURITY.md CONTRIBUTING.md CHANGELOG.md; do
            if [ ! -f "$FILE" ]; then
              echo "::error::Required documentation file missing: $FILE"
              MISSING=1
            else
              echo "Found: $FILE"
            fi
          done
          if [ "$MISSING" -eq 1 ]; then
            exit 1
          fi
          echo "All required documentation files are present."

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"

      - name: Install uv
        # Pin the installer itself so the workflow stays reproducible even when
        # uv.lock is unchanged. Bump in lockstep with local/dev uv upgrades.
        run: pip install "uv==0.11.21"

      - name: Sync the locked dev toolchain
        run: uv sync --frozen --group dev

      - name: Lint (ruff)
        run: uv run ruff check scripts/ tests/

      - name: Type-check (mypy)
        run: uv run mypy scripts/

      - name: Type-check (basedpyright)
        run: uv run basedpyright

      - name: Test (pytest)
        run: uv run pytest
