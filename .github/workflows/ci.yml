name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Verify key documentation files exist
        run: |
          MISSING=0
          for FILE in README.md CLAUDE.md SECURITY.md CONTRIBUTING.md CHANGELOG.md; do
            if [ ! -f "$FILE" ]; then
              echo "::error::Required documentation file missing: $FILE"
              MISSING=1
            else
              echo "Found: $FILE"
            fi
          done
          if [ "$MISSING" -eq 1 ]; then
            exit 1
          fi
          echo "All required documentation files are present."
