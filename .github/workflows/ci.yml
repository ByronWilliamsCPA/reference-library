name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'merge_group' }}

jobs:
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5  # v2.19.3
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            codeload.github.com:443

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Verify key documentation files exist
        run: |
          MISSING=0
          for FILE in README.md CLAUDE.md SECURITY.md CONTRIBUTING.md CHANGELOG.md; do
            if [ ! -f "$FILE" ]; then
              echo "::error::Required documentation file missing: $FILE"
              MISSING=1
            else
              echo "Found: $FILE"
            fi
          done
          if [ "$MISSING" -eq 1 ]; then
            exit 1
          fi
          echo "All required documentation files are present."
