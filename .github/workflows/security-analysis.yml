# Security Analysis Workflow
# Delegates security scans to the org-level reusable workflow.
name: Security Analysis

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Weekly scan on Mondays at 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions: read-all

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  security:
    name: Security Analysis
    permissions:
      contents: read
      security-events: write
      pull-requests: write
      actions: read
    uses: ByronWilliamsCPA/.github/.github/workflows/python-security-analysis.yml@de201234d10d1e0705e259e57e9d63e87a6ae0ac # main
    with:
      python-version: "3.12"
      run-safety: false
      run-codeql: false
      run-dependency-review: false
      run-osv: false
      run-bandit: false

  security-gate-validation:
    name: Security Gate Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [security]
    if: always()
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99  # v2.19.2
        with:
          egress-policy: audit
      - name: Check security scan results
        env:
          SECURITY_RESULT: ${{ needs.security.result }}
        run: |
          if [ "$SECURITY_RESULT" != "success" ]; then
            echo "::error::Security Gate Validation failed: security scan result is $SECURITY_RESULT"
            exit 1
          fi
          echo "Security Gate Validation passed"
