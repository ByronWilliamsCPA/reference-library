# SBOM Generation Workflow
# Generates a CycloneDX SBOM of the Python dependency surface (cataloged by
# syft from pyproject.toml and uv.lock) on push to main and weekly. It does
# not enumerate GitHub Actions or pre-commit hooks; those are SHA-pinned and
# tracked by Renovate instead.
# Documentation: https://github.com/anchore/sbom-action
name: SBOM Generation

on:
  push:
    branches: [main]
  schedule:
    # Weekly scan on Mondays at 06:17 UTC to track dependency drift.
    # Non-zero minute offset reduces queue wait at the round-hour load spike.
    - cron: '17 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: block
          # Endpoints confirmed by an audit-mode run (issue #37). anchore/sbom-action
          # v0.24.0 fetches the syft install script from raw.githubusercontent.com,
          # checks/installs via get.anchore.io, and downloads the syft binary from
          # release-assets.githubusercontent.com (GitHub's release-asset CDN, which
          # superseded objects.githubusercontent.com around 2026-05-16, the date this
          # workflow began failing). GitHub Actions essential endpoints and the
          # results cache host are auto-allowed by harden-runner.
          allowed-endpoints: >
            github.com:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            get.anchore.io:443

      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7
        with:
          persist-credentials: false

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          artifact-name: sbom-cyclonedx.json
          upload-release-assets: false
          upload-artifact: true
          upload-artifact-retention: 90
