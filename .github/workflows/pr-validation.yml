# PR Validation - Dependency & Standards Validation
# Inline replacement for the removed python-pr-validation.yml reusable workflow.
# Checks lock-file integrity and scans for known dependency vulnerabilities.
name: PR Validation

"on":
  pull_request:
    branches:
      - main
      - master
      - develop
  # merge_group: GitHub merge queues fire this event, not pull_request, so the
  # required "Dependency & Standards Validation" context must trigger on it or
  # the queue stalls waiting for a status that never reports.
  merge_group:

concurrency:
  # Cancel superseded runs; the required-check result comes from the newest
  # commit anyway, so stale runs only burn minutes.
  group: pr-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Dependency & Standards Validation
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Verify lock file is up to date
        run: uv lock --check

      - name: Install dependencies from lockfile
        run: uv sync --all-extras --frozen

      - name: Check for known vulnerabilities
        run: uv run --frozen pip-audit
