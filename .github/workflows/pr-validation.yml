# PR Validation - Dependency & Standards Validation
# Inline replacement for the removed python-pr-validation.yml reusable workflow.
# Checks lock-file integrity and scans for known dependency vulnerabilities.
name: PR Validation

"on":
  pull_request:
    branches:
      - main
      - master
      - develop
  # merge_group: GitHub merge queues fire this event, not pull_request, so the
  # required "Dependency & Standards Validation" context must trigger on it or
  # the queue stalls waiting for a status that never reports.
  merge_group:

concurrency:
  # Cancel superseded runs; the required-check result comes from the newest
  # commit anyway, so stale runs only burn minutes.
  group: pr-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Dependency & Standards Validation
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Verify lock file is up to date
        run: uv lock --check

      - name: Install dependencies from lockfile
        run: uv sync --all-extras --frozen

      - name: Check for known vulnerabilities
        run: uv run --frozen pip-audit
