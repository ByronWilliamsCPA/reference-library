# OpenSSF Scorecard for Claude Code Configuration
# Delegates to the org-level reusable Scorecard workflow.
#
# Dashboard: https://securityscorecards.dev/viewer/?uri=github.com/ByronWilliamsCPA/reference-library
# Documentation: https://github.com/ossf/scorecard
name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    # Weekly on Tuesdays at 21:21 UTC
    - cron: '21 21 * * 2'
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions: read-all

jobs:
  scorecard:
    name: Scorecard Analysis
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    uses: ByronWilliamsCPA/.github/.github/workflows/python-scorecard.yml@de201234d10d1e0705e259e57e9d63e87a6ae0ac  # main
    with:
      # publish-results: false -- OIDC repository claim resolves to org .github repo
      # when called as a reusable callee; setting true publishes to wrong repo.
      publish-results: false
